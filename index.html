<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Felipe Pabón</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .container {
      text-align: center;
      padding: 2rem;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #f0f6fc;
    }

    p {
      font-size: 1.1rem;
      color: #8b949e;
      margin-bottom: 2rem;
    }

    .badge {
      display: inline-block;
      background-color: #238636;
      color: #ffffff;
      font-size: 0.85rem;
      padding: 0.3rem 0.9rem;
      border-radius: 2rem;
      font-weight: 500;
      letter-spacing: 0.03em;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Felipe Pabón</h1>
    <p>Sitio en construcción — GitHub Pages activo ✓</p>
    <span class="badge">🚀 Despliegue exitoso</span>
  </div>
</body>
</html>
